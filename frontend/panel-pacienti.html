<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacienți — RecepAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;--s1:#131313;--s2:#1A1A1A;
  --b1:#252525;--b2:#303030;--b3:#3A3A3A;
  --tx:#F0F0F0;--t2:#999;--t3:#555;
  --teal:#00D4AA;--td:rgba(0,212,170,.1);--tm:rgba(0,212,170,.2);
  --grn:#00CC88;--ylw:#FFB800;--red:#FF4455;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--tx);min-height:100vh;padding:24px}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.page-sub{font-size:13px;color:var(--t3);margin-top:3px}

/* SEARCH + FILTER BAR */
.search-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-input{flex:1;background:var(--s1);border:1.5px solid var(--b1);border-radius:10px;padding:10px 16px;color:var(--tx);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--teal)}
.filter-btn{padding:9px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--b1);color:var(--t2);background:transparent;transition:all .15s;white-space:nowrap}
.filter-btn.active{border-color:var(--teal);color:var(--teal);background:var(--td)}

/* LAYOUT */
.patients-layout{display:grid;grid-template-columns:1fr 380px;gap:16px}
@media(max-width:900px){.patients-layout{grid-template-columns:1fr}}

/* PATIENTS LIST */
.patients-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden}
.patients-card-head{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.patients-card-title{font-size:13px;font-weight:700}
.patients-count{font-size:11px;color:var(--teal);font-weight:600;background:var(--td);padding:2px 8px;border-radius:8px}

.patient-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.patient-row:last-child{border-bottom:none}
.patient-row:hover{background:var(--s2)}
.patient-row.selected{background:var(--td);border-left:2px solid var(--teal)}
.pat-av{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700;color:var(--teal)}
.pat-info{flex:1}
.pat-name{font-size:13px;font-weight:700}
.pat-meta{font-size:11px;color:var(--t3);margin-top:1px}
.pat-right{text-align:right;flex-shrink:0}
.pat-last{font-size:11px;color:var(--t2)}
.pat-visits{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;margin-top:3px;display:inline-block}
.pv-new{background:var(--td);color:var(--teal)}
.pv-regular{background:rgba(0,204,136,.12);color:var(--grn)}
.pv-loyal{background:rgba(255,184,0,.12);color:var(--ylw)}

/* PATIENT DETAIL */
.patient-detail{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;position:sticky;top:24px}
.pd-header{padding:18px;border-bottom:1px solid var(--b1);background:var(--td)}
.pd-av{width:56px;height:56px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000;margin-bottom:10px}
.pd-name{font-size:17px;font-weight:800;margin-bottom:3px}
.pd-meta{font-size:12px;color:var(--t2)}
.pd-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.pd-stat{background:rgba(0,0,0,.2);border-radius:8px;padding:8px 10px;text-align:center}
.pd-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;color:var(--teal)}
.pd-stat-lbl{font-size:10px;color:var(--t2);margin-top:2px}

.pd-tabs{display:flex;gap:2px;padding:10px 14px;border-bottom:1px solid var(--b1);background:var(--s2)}
.pd-tab{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .15s}
.pd-tab.active{background:var(--teal);color:#000}
.pd-body{padding:16px}

/* CONTACT INFO */
.info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.info-label{font-size:11px;color:var(--t3);width:70px;flex-shrink:0;font-weight:600}
.info-value{font-size:13px;flex:1}
.info-edit{background:transparent;border:none;color:var(--t3);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:5px}
.info-edit:hover{color:var(--teal);background:var(--td)}

/* VISITS TIMELINE */
.visit-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);position:relative}
.visit-item:last-child{border-bottom:none}
.visit-dot{width:10px;height:10px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:4px;border:2px solid var(--s1)}
.visit-info{flex:1}
.visit-proc{font-size:13px;font-weight:600}
.visit-date{font-size:11px;color:var(--t3);margin-top:1px}
.visit-doc{font-size:11px;color:var(--teal);margin-top:1px}
.visit-price{font-size:12px;font-weight:700;color:var(--tx);font-family:'JetBrains Mono',monospace}
.visit-note{font-size:11px;color:var(--t2);margin-top:4px;font-style:italic;background:var(--s2);padding:6px 8px;border-radius:6px}

/* NOTES */
.note-item{background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:12px 14px;margin-bottom:8px}
.note-header{display:flex;justify-content:space-between;margin-bottom:6px}
.note-date{font-size:10px;color:var(--t3)}
.note-doc{font-size:10px;color:var(--teal);font-weight:600}
.note-text{font-size:13px;color:var(--t2);line-height:1.6}

/* ADD NOTE */
.add-note{margin-top:12px}
.note-input{width:100%;background:var(--s2);border:1.5px solid var(--b1);border-radius:9px;padding:10px 13px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:80px;transition:border-color .2s;margin-bottom:8px}
.note-input:focus{border-color:var(--teal)}

/* MEDICAL INFO */
.med-field{margin-bottom:12px}
.med-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.med-value{font-size:13px;color:var(--t2)}
.med-input{width:100%;background:var(--s2);border:1.5px solid var(--b1);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.med-input:focus{border-color:var(--teal)}

/* EMPTY STATE */
.empty-detail{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s}
.btn-primary{background:var(--teal);color:#000}
.btn-primary:hover{background:#00FFCC}
.btn-ghost{background:transparent;color:var(--t2);border:1.5px solid var(--b2)}
.btn-ghost:hover{color:var(--tx)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}

/* MODAL NEW PATIENT */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:500px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--b1);display:flex;gap:10px;justify-content:flex-end}
.field label{font-size:11px;font-weight:600;color:var(--t3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1.5px solid var(--b1);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px}
.field input:focus,.field select:focus{border-color:var(--teal)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--s1);border:1px solid var(--tm);color:var(--tx);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:all .3s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">👥 Pacienți</div>
    <div class="page-sub">Fișe complete, istoric vizite, notițe medicale</div>
  </div>
  <button class="btn btn-primary" onclick="openNewPatient()">+ Pacient nou</button>
</div>

<div class="search-bar">
  <input class="search-input" placeholder="🔍 Caută după nume, telefon, email..." id="patient-search" oninput="filterPatients(this.value)">
  <button class="filter-btn active" onclick="setFilter('all',this)">Toți</button>
  <button class="filter-btn" onclick="setFilter('new',this)">Prima vizită</button>
  <button class="filter-btn" onclick="setFilter('active',this)">Activi</button>
  <button class="filter-btn" onclick="setFilter('inactive',this)">Inactivi</button>
</div>

<div class="patients-layout">

  <!-- LIST -->
  <div class="patients-card">
    <div class="patients-card-head">
      <span class="patients-card-title">Lista pacienți</span>
      <span class="patients-count" id="patients-count">0 pacienți</span>
    </div>
    <div id="patients-list"></div>
  </div>

  <!-- DETAIL -->
  <div class="patient-detail" id="patient-detail">
    <div class="empty-detail">
      <div class="empty-icon">👤</div>
      <div style="font-size:14px;font-weight:700;color:var(--t2);margin-bottom:6px">Selectează un pacient</div>
      <div style="font-size:13px">Click pe un pacient pentru a vedea fișa completă</div>
    </div>
  </div>

</div>

<!-- NEW PATIENT MODAL -->
<div class="modal-overlay" id="new-patient-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">+ Pacient nou</span>
      <button class="btn btn-ghost btn-sm" onclick="closeNewPatient()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>Prenume și Nume *</label><input id="np-name" placeholder="Maria Ionescu"></div>
        <div class="field"><label>Telefon *</label><input id="np-phone" placeholder="0721 234 567" type="tel"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Email</label><input id="np-email" placeholder="maria@email.ro" type="email"></div>
        <div class="field"><label>Data nașterii</label><input id="np-dob" type="date"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Sex</label>
          <select id="np-sex"><option value="">—</option><option value="F">Feminin</option><option value="M">Masculin</option></select>
        </div>
        <div class="field"><label>Doctor principal</label>
          <select id="np-doctor">
            <option value="">Fără preferință</option>
            <option value="d1">Dr. Andrei Popescu</option>
            <option value="d2">Dr. Raluca Stan</option>
            <option value="d3">Dr. Elena Maria</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Cum a aflat de clinică</label>
        <select id="np-source">
          <option value="">—</option>
          <option value="ai_widget">Widget AI</option>
          <option value="google">Google</option>
          <option value="referral">Recomandare pacient</option>
          <option value="facebook">Facebook/Instagram</option>
          <option value="walk_in">Walk-in</option>
          <option value="phone">Telefon</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeNewPatient()">Anulează</button>
      <button class="btn btn-primary" onclick="saveNewPatient()">💾 Salvează pacient</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = (window.parent?.localStorage || localStorage).getItem('recepai_client_id') || 'CLI-UNKNOWN';
const API = (window.parent?.localStorage || localStorage).getItem('recepai_api') || 'http://localhost:8080';

let PATIENTS = JSON.parse(localStorage.getItem('recepai_patients_' + CLIENT_ID) || 'null') || [
  {
    id: 'p1', name: 'Maria Ionescu', phone: '0721 234 567', email: 'maria@email.ro',
    dob: '1985-03-15', sex: 'F', doctor: 'd1', source: 'ai_widget',
    createdAt: '2026-01-10', lastVisit: '2026-07-15', visits: 3,
    allergies: 'Penicilină', conditions: 'Hipertensiune arterială',
    medications: 'Enalapril 10mg',
    history: [
      { id: 'v1', date: '2026-07-15', proc: 'Implant Straumann BL 4.1×10mm', doc: 'Dr. Popescu', price: 3500, note: 'Inserare implant, osteointegrare în curs. Revenire la 3 luni.' },
      { id: 'v2', date: '2026-04-10', proc: 'Consultație + radiografie', doc: 'Dr. Popescu', price: 150, note: 'Prima consultație, plan de tratament discutat.' },
      { id: 'v3', date: '2026-02-20', proc: 'Detartraj + periaj profesional', doc: 'Dr. Maria', price: 250, note: '' },
    ],
    notes: [
      { id: 'n1', date: '2026-07-15', doc: 'Dr. Popescu', text: 'Pacientă anxioasă, necesită sedare ușoară. Reacție bună la anestezie locală. Contraindicat AINS.' },
    ]
  },
  {
    id: 'p2', name: 'Alexandru Popa', phone: '0741 111 222', email: '',
    dob: '1990-07-22', sex: 'M', doctor: 'd1', source: 'google',
    createdAt: '2026-07-20', lastVisit: '2026-07-20', visits: 1,
    allergies: '', conditions: '', medications: '',
    history: [
      { id: 'v4', date: '2026-07-20', proc: 'Consultație + radiografie', doc: 'Dr. Popescu', price: 150, note: 'Prima vizită. Plan de tratament: implant zone 16, tratament canal zone 25.' },
    ],
    notes: []
  },
  {
    id: 'p3', name: 'Elena Constantin', phone: '0733 456 789', email: 'elena@email.ro',
    dob: '1978-11-05', sex: 'F', doctor: 'd3', source: 'referral',
    createdAt: '2025-06-15', lastVisit: '2026-07-10', visits: 8,
    allergies: 'Latex', conditions: '', medications: '',
    history: [
      { id: 'v5', date: '2026-07-10', proc: 'Control implant', doc: 'Dr. Popescu', price: 200, note: 'Osteointegrare completă. Programare coroană.' },
      { id: 'v6', date: '2026-04-05', proc: 'Detartraj + periaj', doc: 'Dr. Maria', price: 250, note: '' },
      { id: 'v7', date: '2026-01-15', proc: 'Obturație compozită', doc: 'Dr. Maria', price: 200, note: 'Zone 26 ocluzal.' },
    ],
    notes: [
      { id: 'n2', date: '2026-07-10', doc: 'Dr. Popescu', text: 'Alergie latex documentată! Folosiți mănuși nitrile.' }
    ]
  },
  {
    id: 'p4', name: 'Radu Ionescu', phone: '0722 333 444', email: 'radu@email.ro',
    dob: '2005-09-12', sex: 'M', doctor: 'd2', source: 'facebook',
    createdAt: '2025-09-01', lastVisit: '2026-06-20', visits: 12,
    allergies: '', conditions: '', medications: '',
    history: [
      { id: 'v8', date: '2026-06-20', proc: 'Control lunar ortodonție', doc: 'Dr. Stan', price: 200, note: 'Progres bun. Estimare finalizare: 6 luni.' },
      { id: 'v9', date: '2026-05-20', proc: 'Control lunar ortodonție', doc: 'Dr. Stan', price: 200, note: '' },
    ],
    notes: []
  },
  {
    id: 'p5', name: 'Mihai Vlad', phone: '0766 789 012', email: '',
    dob: '1965-02-28', sex: 'M', doctor: 'd4', source: 'phone',
    createdAt: '2026-03-10', lastVisit: '2026-05-15', visits: 2,
    allergies: 'Aspirină', conditions: 'Diabet tip 2', medications: 'Metformin 500mg',
    history: [
      { id: 'v10', date: '2026-05-15', proc: 'Tratament canal monoradicular', doc: 'Dr. Vlad', price: 500, note: 'Zone 46. Finalizat în 2 ședințe.' },
    ],
    notes: [
      { id: 'n3', date: '2026-03-10', doc: 'Dr. Vlad', text: 'Diabet tip 2, glicemie monitorizată. Vindecarea poate fi mai lentă. Evitați proceduri mari fără confirmare glicemie stabilă.' }
    ]
  },
];

let selectedPatient = null;
let currentFilter = 'all';
let searchQuery = '';

// ── RENDER LIST ──
function filterPatients(q) {
  searchQuery = q;
  renderList();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  let filtered = PATIENTS.filter(p => {
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.phone.includes(q) || (p.email||'').toLowerCase().includes(q);
    const matchFilter = currentFilter === 'all' ? true :
      currentFilter === 'new' ? p.visits <= 1 :
      currentFilter === 'active' ? p.visits >= 3 :
      currentFilter === 'inactive' ? (new Date() - new Date(p.lastVisit)) > 6*30*24*60*60*1000 : true;
    return matchSearch && matchFilter;
  });

  document.getElementById('patients-count').textContent = filtered.length + ' pacienți';

  const list = document.getElementById('patients-list');
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--t3)">Niciun pacient găsit</div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const initials = p.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
    const visitsClass = p.visits <= 1 ? 'pv-new' : p.visits >= 8 ? 'pv-loyal' : 'pv-regular';
    const visitsLabel = p.visits <= 1 ? 'Prima vizită' : p.visits >= 8 ? `${p.visits} vizite 🌟` : `${p.visits} vizite`;
    const lastVisit = p.lastVisit ? new Date(p.lastVisit).toLocaleDateString('ro-RO',{day:'numeric',month:'short',year:'numeric'}) : '—';
    return `<div class="patient-row ${selectedPatient?.id === p.id ? 'selected' : ''}" onclick="selectPatient('${p.id}')">
      <div class="pat-av">${initials}</div>
      <div class="pat-info">
        <div class="pat-name">${p.name}</div>
        <div class="pat-meta">📞 ${p.phone}${p.email ? ' · ' + p.email : ''}</div>
      </div>
      <div class="pat-right">
        <div class="pat-last">${lastVisit}</div>
        <span class="pat-visits ${visitsClass}">${visitsLabel}</span>
      </div>
    </div>`;
  }).join('');
}

// ── SELECT PATIENT ──
function selectPatient(id) {
  selectedPatient = PATIENTS.find(p => p.id === id);
  renderList();
  renderDetail();
}

function renderDetail() {
  const p = selectedPatient;
  if (!p) return;

  const initials = p.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  const totalSpent = (p.history||[]).reduce((a,v) => a + (v.price||0), 0);
  const dob = p.dob ? new Date(p.dob) : null;
  const age = dob ? Math.floor((new Date() - dob) / (365.25*24*60*60*1000)) : null;
  const lastVisit = p.lastVisit ? new Date(p.lastVisit).toLocaleDateString('ro-RO',{day:'numeric',month:'long',year:'numeric'}) : '—';

  document.getElementById('patient-detail').innerHTML = `
    <div class="pd-header">
      <div class="pd-av">${initials}</div>
      <div class="pd-name">${p.name}</div>
      <div class="pd-meta">${age ? age + ' ani · ' : ''}${p.sex === 'F' ? '♀' : p.sex === 'M' ? '♂' : ''} · Ultima vizită: ${lastVisit}</div>
      <div class="pd-stats">
        <div class="pd-stat"><div class="pd-stat-val">${p.visits}</div><div class="pd-stat-lbl">Vizite</div></div>
        <div class="pd-stat"><div class="pd-stat-val">${totalSpent ? totalSpent.toLocaleString('ro') : '0'}</div><div class="pd-stat-lbl">RON total</div></div>
        <div class="pd-stat"><div class="pd-stat-val">${(p.notes||[]).length}</div><div class="pd-stat-lbl">Notițe</div></div>
      </div>
    </div>

    <div class="pd-tabs">
      <div class="pd-tab active" onclick="showPdTab('contact',this)">📞 Contact</div>
      <div class="pd-tab" onclick="showPdTab('history',this)">📋 Istoric</div>
      <div class="pd-tab" onclick="showPdTab('notes',this)">📝 Notițe</div>
      <div class="pd-tab" onclick="showPdTab('medical',this)">⚕️ Medical</div>
    </div>

    <div class="pd-body" id="pd-body">
      <!-- populated by tab -->
    </div>`;

  showPdTab('contact', document.querySelector('.pd-tab'));
}

function showPdTab(tab, el) {
  const p = selectedPatient;
  document.querySelectorAll('.pd-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');

  const body = document.getElementById('pd-body');

  if (tab === 'contact') {
    const sourceLabels = { ai_widget:'🤖 Widget AI', google:'🔍 Google', referral:'👥 Recomandare', facebook:'📱 Social', walk_in:'🚶 Walk-in', phone:'📞 Telefon' };
    body.innerHTML = `
      <div class="info-row"><span class="info-icon">📞</span><span class="info-label">Telefon</span><span class="info-value">${p.phone}</span><button class="info-edit">✏️</button></div>
      <div class="info-row"><span class="info-icon">📧</span><span class="info-label">Email</span><span class="info-value">${p.email||'—'}</span><button class="info-edit">✏️</button></div>
      <div class="info-row"><span class="info-icon">🎂</span><span class="info-label">Naștere</span><span class="info-value">${p.dob ? new Date(p.dob).toLocaleDateString('ro-RO') : '—'}</span></div>
      <div class="info-row"><span class="info-icon">👨‍⚕️</span><span class="info-label">Doctor</span><span class="info-value" style="color:var(--teal)">${getDoctorName(p.doctor)}</span></div>
      <div class="info-row"><span class="info-icon">📍</span><span class="info-label">Sursa</span><span class="info-value">${sourceLabels[p.source]||'—'}</span></div>
      <div class="info-row"><span class="info-icon">📅</span><span class="info-label">Înregistrat</span><span class="info-value">${p.createdAt ? new Date(p.createdAt).toLocaleDateString('ro-RO',{day:'numeric',month:'long',year:'numeric'}) : '—'}</span></div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="alert('Programare nouă pentru ${p.name}')">📅 Programare nouă</button>
        <button class="btn btn-ghost btn-sm" onclick="alert('SMS către ${p.phone}')">📱 Trimite SMS</button>
      </div>`;
  }

  if (tab === 'history') {
    const visits = p.history || [];
    body.innerHTML = visits.length === 0
      ? '<div style="text-align:center;padding:30px;color:var(--t3)">Nicio vizită înregistrată</div>'
      : visits.map(v => `
        <div class="visit-item">
          <div class="visit-dot"></div>
          <div class="visit-info">
            <div class="visit-proc">${v.proc}</div>
            <div class="visit-date">${new Date(v.date).toLocaleDateString('ro-RO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            <div class="visit-doc">👨‍⚕️ ${v.doc}</div>
            ${v.note ? `<div class="visit-note">${v.note}</div>` : ''}
          </div>
          <div class="visit-price">${v.price ? v.price.toLocaleString('ro') + ' RON' : '—'}</div>
        </div>`).join('');
  }

  if (tab === 'notes') {
    const notes = p.notes || [];
    body.innerHTML = (notes.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--t3)">Nicio notiță</div>' :
      notes.map(n => `
        <div class="note-item">
          <div class="note-header">
            <span class="note-doc">👨‍⚕️ ${n.doc}</span>
            <span class="note-date">${new Date(n.date).toLocaleDateString('ro-RO')}</span>
          </div>
          <div class="note-text">${n.text}</div>
        </div>`).join('')) +
      `<div class="add-note">
        <textarea class="note-input" id="new-note-text" placeholder="Adaugă notiță medicală..."></textarea>
        <button class="btn btn-primary btn-sm" onclick="addNote('${p.id}')">💾 Salvează notița</button>
      </div>`;
  }

  if (tab === 'medical') {
    body.innerHTML = `
      <div class="med-field">
        <div class="med-label">⚠️ Alergii</div>
        <input class="med-input" value="${p.allergies||''}" placeholder="ex: Penicilină, Latex..." id="med-allergies">
      </div>
      <div class="med-field">
        <div class="med-label">🏥 Afecțiuni cunoscute</div>
        <input class="med-input" value="${p.conditions||''}" placeholder="ex: Hipertensiune, Diabet..." id="med-conditions">
      </div>
      <div class="med-field">
        <div class="med-label">💊 Medicație curentă</div>
        <input class="med-input" value="${p.medications||''}" placeholder="ex: Enalapril 10mg..." id="med-medications">
      </div>
      <div class="med-field">
        <div class="med-label">🩺 Observații generale</div>
        <textarea class="med-input" style="min-height:80px;resize:vertical" placeholder="Alte observații medicale relevante..." id="med-notes">${p.medNotes||''}</textarea>
      </div>
      <button class="btn btn-primary btn-sm" onclick="saveMedical('${p.id}')">💾 Salvează fișa medicală</button>`;
  }
}

function addNote(patientId) {
  const text = document.getElementById('new-note-text')?.value.trim();
  if (!text) return;
  const p = PATIENTS.find(p => p.id === patientId);
  if (!p) return;
  p.notes = p.notes || [];
  p.notes.unshift({ id: 'n' + Date.now(), date: new Date().toISOString().split('T')[0], doc: 'Dr. —', text });
  savePatients();
  showPdTab('notes', document.querySelector('.pd-tab:nth-child(3)'));
  showToast('✅ Notiță salvată');
}

function saveMedical(patientId) {
  const p = PATIENTS.find(p => p.id === patientId);
  if (!p) return;
  p.allergies = document.getElementById('med-allergies')?.value || '';
  p.conditions = document.getElementById('med-conditions')?.value || '';
  p.medications = document.getElementById('med-medications')?.value || '';
  p.medNotes = document.getElementById('med-notes')?.value || '';
  savePatients();
  showToast('✅ Fișă medicală salvată');
}

function getDoctorName(id) {
  const docs = { d1: 'Dr. Andrei Popescu', d2: 'Dr. Raluca Stan', d3: 'Dr. Elena Maria', d4: 'Dr. Mihai Vlad' };
  return docs[id] || '—';
}

// ── NEW PATIENT ──
function openNewPatient() { document.getElementById('new-patient-modal').classList.add('show'); }
function closeNewPatient() { document.getElementById('new-patient-modal').classList.remove('show'); }

function saveNewPatient() {
  const name = document.getElementById('np-name').value.trim();
  const phone = document.getElementById('np-phone').value.trim();
  if (!name || !phone) { showToast('⚠ Completează numele și telefonul'); return; }
  const p = {
    id: 'p' + Date.now(), name, phone,
    email: document.getElementById('np-email').value,
    dob: document.getElementById('np-dob').value,
    sex: document.getElementById('np-sex').value,
    doctor: document.getElementById('np-doctor').value,
    source: document.getElementById('np-source').value,
    createdAt: new Date().toISOString().split('T')[0],
    lastVisit: new Date().toISOString().split('T')[0],
    visits: 0, history: [], notes: []
  };
  PATIENTS.unshift(p);
  savePatients();
  renderList();
  closeNewPatient();
  selectPatient(p.id);
  showToast('✅ Pacient adăugat!');
}

function savePatients() {
  localStorage.setItem('recepai_patients_' + CLIENT_ID, JSON.stringify(PATIENTS));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──
renderList();
</script>
</body>
</html>
